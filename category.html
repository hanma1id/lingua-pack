<!doctype html>
<!-- ============================================================
     category.html — 카테고리 상세 (필수 단어)
     URL — category.html?lang=en&id=numbers
     리스트 / 플래시카드 두 모드.
     ============================================================ -->
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#4a6fa5" />
  <title>카테고리</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-row">
      <button class="back-btn" id="backBtn" type="button" aria-label="뒤로">←</button>
      <select id="langSelect" class="lang-select" aria-label="언어 선택"></select>
      <h1 id="pageTitle" class="page-subtitle">카테고리</h1>
      <!-- 헤더 속도 슬라이더 — 같은 줄 우측 -->
      <div class="header-rate">
        <span class="rate-label">속도</span>
        <input type="range" id="rateSlider" min="0.4" max="1.0" step="0.1" value="0.8" aria-label="발음 속도" />
        <span class="rate-value" id="rateValue">0.8x</span>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="loading" class="loading">불러오는 중…</div>
    <div id="contentArea" class="item-list"></div>
    <div id="footerArea" class="footer-area"></div>
  </main>

  <script type="module" src="js/category.js"></script>
</body>
</html>
