<!doctype html>
<!-- ============================================================
     home.html — 메인 화면 (탭 2개)
     URL — home.html?lang=es
     상단 — 큰 언어 드롭다운 (🇪🇸 스페인어 ▾)
     1) 필수 단어 — 카테고리 타일
     2) 여행 회화 — 상황 타일
     ============================================================ -->
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#4a6fa5" />
  <title>Lingua Pack</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-row">
      <!-- 큰 언어 드롭다운 — 좌측에 두드러지게, 학습 중인 언어가 한눈에 -->
      <select id="langSelect" class="lang-select" aria-label="언어 선택"></select>
      <small class="brand-mini">Lingua Pack</small>
    </div>
    <div class="tab-bar" id="tabBar" role="tablist">
      <button data-tab="alphabet">알파벳</button>
      <button class="active" data-tab="essentials">필수 단어</button>
      <button data-tab="travel">여행 회화</button>
    </div>
  </header>

  <main class="container">
    <div id="loading" class="loading">불러오는 중…</div>
    <div id="contentArea"></div>
  </main>

  <script type="module" src="js/home.js"></script>
</body>
</html>
